name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
      - '.npmrc'
      - 'package-lock.json'
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
      - '.npmrc'
      - 'package-lock.json'

jobs:
  ci:
    name: Type Check, Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
