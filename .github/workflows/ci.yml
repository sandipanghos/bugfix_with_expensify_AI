name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
      - '.npmrc'
      - 'package-lock.json'
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
      - '.npmrc'
      - 'package-lock.json'

jobs:
  ci:
    name: Type Check, Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy Backend (Fly.io)
    needs: ci
    # Deploy only after CI passes, only for master pushes (and manual dispatch).
    # Never on pull requests. Independent of the repo default branch.
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: backend
        run: flyctl deploy --remote-only --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 10
          curl -f "${{ secrets.PROD_API_URL }}/health" || exit 1

